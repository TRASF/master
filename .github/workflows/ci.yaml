name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CUDA_VISIBLE_DEVICES: "-1"
      TF_CPP_MIN_LOG_LEVEL: "2"
      WANDB_MODE: disabled
      WINGBEAT_ENABLE_WANDB: "false"
      WINGBEAT_RUNTIME_ROOT: ${{ runner.temp }}/wingbeat_ml
      WINGBEAT_PROFILE: ${{ github.workspace }}/configs/profiles/ci.yaml
      WINGBEAT_DATASET_DIR: ${{ github.workspace }}/tests/fixtures/audio_11class

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU test environment
        shell: bash
        run: |
          python -m pip install --upgrade pip
          sed 's/tensorflow\[and-cuda\]/tensorflow/' requirements.txt > "$RUNNER_TEMP/requirements-ci.txt"
          python -m pip install -r "$RUNNER_TEMP/requirements-ci.txt"
          python -m pip install --no-deps -e .
          python -m pip install pytest build

      - name: Run tests
        run: PYTHONPATH="$PWD:$PWD/src" pytest -q --tb=short

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify installed wheel
        shell: bash
        run: |
          python -m venv --system-site-packages "$RUNNER_TEMP/wheel-venv"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install --no-deps --force-reinstall dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/wheel-venv/bin/python" -c "import wingbeat_ml; print(wingbeat_ml.__version__)"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m wingbeat_ml --version

      - name: Run CPU smoke training
        run: bash ops/wandb/train-pretrain.sh
