labels:
    Ae_aegypti_Female: 0
    Ae_aegypti_Male: 1
    Ae_albopictus_Female: 2
    Ae_albopictus_Male: 3
    An_dirus_Female: 4
    An_dirus_Male: 5
    An_minimus_Female: 6
    An_minimus_Male: 7
    Cx_quin_Female: 8
    Cx_quin_Male: 9
    No.Mos: 10

wandb:
    enabled: true
    project: "MosSongPlus"
    log_weights_freq: 1
    aggregate_plot_freq: 1
    prediction_table_max_rows: 5000
    log_prediction_audio: true

train:
    batch_size: 256
    shuffle: True
    epochs: 1000
    seed: 43
    warmup_epochs: 15
    warmup_augment_p: 0.0

reproducibility:
    enabled: true
    seed: 42
    deterministic_ops: true
    deterministic_data: true

optimizer:
    name: Adam
    learning_rate: 0.001

model:
    output_activation: null

loss:
    name: CategoricalCrossentropy
    from_logits: true
    reduction: none

callbacks:
    early_stopping:
        monitor: val_macro_f1
        patience: 100
        mode: max
        restore_best_weights: True

    model_checkpoint:
        monitor: val_macro_f1
        save_best_only: True
        save_weights_only: True
        mode: max

    reduce_lr_on_plateau:
        monitor: val_macro_f1
        factor: 0.5
        patience: 50
        min_lr: 1e-6
        mode: max
        restore_best_weights: True

    # cosine_annealing:
    #     t_max: 1000
    #     eta_min: 1e-5

augment:
    max_segments_per_file: 100
    segment_overlap:
        train: [0.0, 0.8]
        val: 0.5

    high_pass:
        p: 0.0
        fc: 150

    noise_banks:
        - "dataset/MSB/Environmental/humbug_noises"
        - "dataset/MSB/Environmental/inmp_noises"
        - "dataset/MSB/Environmental/miru_noises"
        - "dataset/MSB/Environmental/noises"
        - "dataset/MSB/Environmental/Nomos"

    noise_overlay:
        p: 0.0
        snr_db: [15, 30]
        envelope_gain: [0.7, 1.0]
        post_gain_db: [-3.0, 3.0]

    random_gain:
        p: 0.0
        gain_db: [-6, 6]

    time_shift:
        p: 0.0
        rate: [-0.05, 0.05]

    pitch_shift:
        p: 0.0
        semitones: [-0.2, 0.2]

    gaussian_noise:
        p: 0.0
        snr_db: [20, 50]

    rms_norm:
        target_rms: 0.05
        max_gain: 15.0
        min_gain: 0.05

audio:
    sample_rate: 8000
    duration: 0.3

dataset:
    indoor: "dataset/MSB/Indoor"
    outdoor: "dataset/MSB/Outdoor"
    mosLab: "dataset/Philip"
    # val_dir: "dataset/MSB/Outdoor"
    split_ratios:
        train: 0.8
        val: 0.1
        test: 0.1

class_weights:
    enabled: true

    values: null
