labels:
    Ae_aegypti_Female: 0
    Ae_aegypti_Male: 1
    Ae_albopictus_Female: 2
    Ae_albopictus_Male: 3
    An_dirus_Female: 4
    An_dirus_Male: 5
    An_minimus_Female: 6
    An_minimus_Male: 7
    Cx_quin_Female: 8
    Cx_quin_Male: 9
    No.Mos: 10

train:
    batch_size: 256
    shuffle: True
    epochs: 1000
    step_ratio: 0.3
    seed: 43

reproducibility:
    enabled: true
    seed: 42
    deterministic_ops: true
    deterministic_data: true
optimizer:
    name: Adam
    learning_rate: 0.001

model:
    output_activation: null

loss:
    name: CategoricalCrossentropy
    from_logits: true
    reduction: none

callbacks:
    early_stopping:
        monitor: val_macro_f1
        patience: 100
        mode: max
        restore_best_weights: True

    model_checkpoint:
        monitor: val_macro_f1
        save_best_only: True
        save_weights_only: True
        mode: max

    reduce_lr_on_plateau:
        monitor: val_macro_f1
        factor: 0.5
        patience: 50
        min_lr: 1e-7
        mode: max
        restore_best_weights: True

augment:

    segment_overlap:
        train: [0.0, 0.8]
        val: 0.5

    noise_banks:
        - "dataset/MSB/Environmental/humbug_noises"
        - "dataset/MSB/Environmental/inmp_noises"
        - "dataset/MSB/Environmental/miru_noises"
        - "dataset/MSB/Environmental/noises"
        - "dataset/MSB/Environmental/Nomos"


    noise_overlay:
        p: 0.0
        snr_db: [10, 25]
        envelope_gain: [0.7, 1.0]
        post_gain_db: [-3.0, 3.0]

    random_gain:
        p: 0.0
        gain_db: [-6, 6]

    time_shift:
        p: 0.0
        rate: [-0.05, 0.05]

    pitch_shift:
        p: 0.0
        semitones: [-0.2, 0.2]

    gaussian_noise:
        p: 0.0
        snr_db: [20, 40]

audio:
    sample_rate: 8000
    duration: 0.3

dataset:
    indoor: "dataset/MSB/Indoor"
    outdoor: "dataset/MSB/Outdoor"
    mosLab: "dataset/Philip"
    # val_dir: "dataset/MSB/Outdoor"
    split_ratios:
        train: 0.8
        val: 0.1
        test: 0.1

class_weights:
    enabled: true

    values:
        0: 1.0 # Ae_aegypti_Female
        1: 3.0 # Ae_aegypti_Male
        2: 1.0 # Ae_albopictus_Female
        3: 1.8 # Ae_albopictus_Male
        4: 1.0 # An_dirus_Female
        5: 2.0 # An_dirus_Male
        6: 1.0 # An_minimus_Female
        7: 2.2 # An_minimus_Male
        8: 1.0 # Cx_quin_Female
        9: 1.6 # Cx_quin_Male
        10: 0.4 # No.Mos
        # null


